name: ChordHero
options:
  bundleIdPrefix: com.codingmonkey
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: targeted
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
targets:
  ChordHero:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        buildPhase: resources
      - path: ../../shared/content/v1
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codingmonkey.ChordHero
        PRODUCT_NAME: ChordHero
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Chord Hero
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.music
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: Chord Hero uses Bluetooth MIDI devices for optional ear-training answers.
    scheme:
      testTargets:
        - ChordHeroTests
        - ChordHeroUITests
      gatherCoverageData: true
  ChordHeroTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
      - path: ../../shared/content/v1
        buildPhase: resources
    dependencies:
      - target: ChordHero
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codingmonkey.ChordHeroTests
        GENERATE_INFOPLIST_FILE: YES
  ChordHeroUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: ChordHero
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codingmonkey.ChordHeroUITests
        GENERATE_INFOPLIST_FILE: YES
